<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANÓTHER DIMENSION VOTING BOOTH</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section id="loginView" class="login-view" hidden>
      <form id="loginForm" class="login-panel">
        <p class="eyebrow">ANÓTHER DIMENSION</p>
        <h1>VOTING BOOTH</h1>
        <label>
          <span>Naam</span>
          <input id="loginName" name="name" autocomplete="username" required />
        </label>
        <label>
          <span>Wachtwoord</span>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Login</button>
        <p id="loginError" class="login-error" role="alert"></p>
      </form>
    </section>

    <section id="projectView" class="project-view" hidden>
      <header class="project-head">
        <div>
          <p class="eyebrow">ANÓTHER DIMENSION</p>
          <h1>VOTING BOOTH</h1>
        </div>
        <button id="projectLogoutButton" type="button">Uitloggen</button>
      </header>
      <main class="project-main">
        <section class="project-list" id="projectList" aria-label="Projecten"></section>
        <aside class="project-tools">
          <form id="newProjectForm" class="new-project-form" hidden>
            <p class="eyebrow">Nieuw project</p>
            <label>
              <span>Projectnaam</span>
              <input id="newProjectTitle" name="title" autocomplete="off" />
            </label>
            <label>
              <span>Klantnaam</span>
              <input id="newProjectClient" name="clientName" autocomplete="off" />
            </label>
            <label>
              <span>Klant e-mail</span>
              <input id="newProjectEmail" name="clientEmail" type="email" autocomplete="email" />
            </label>
            <label>
              <span>Wachtwoord</span>
              <input id="newProjectPassword" name="clientPassword" autocomplete="new-password" />
            </label>
            <label>
              <span>Derde voter</span>
              <input id="newProjectVoter" name="voterName" autocomplete="off" />
            </label>
            <label>
              <span>Derde voter e-mail</span>
              <input id="newProjectVoterEmail" name="voterEmail" type="email" autocomplete="email" />
            </label>
            <label>
              <span>Derde voter wachtwoord</span>
              <input id="newProjectVoterPassword" name="voterPassword" autocomplete="new-password" />
            </label>
            <button type="submit">Maak project</button>
            <p id="newProjectError" class="login-error" role="alert"></p>
          </form>
          <section id="sheetCutter" class="sheet-cutter">
            <p class="eyebrow">Sheet Cutter</p>
            <label>
              <span>Project</span>
              <select id="sheetProjectSelect"></select>
            </label>
            <input id="sheetFileInput" type="file" accept="image/*" hidden />
            <button id="sheetPickButton" type="button">Sheet uploaden</button>
            <div id="sheetStage" class="sheet-stage" hidden>
              <canvas id="sheetCanvas" width="900" height="560"></canvas>
            </div>
            <div class="sheet-actions">
              <button id="sheetResetButton" type="button" hidden>Reset</button>
              <button id="sheetCutButton" class="sheet-cut" type="button" hidden>✅</button>
            </div>
            <p id="sheetStatus" class="login-error" role="alert"></p>
          </section>
        </aside>
      </main>
    </section>

    <div id="appView" hidden>
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">ANÓTHER DIMENSION VOTING BOOTH</p>
        <div class="title-row">
          <h1 data-edit-key="title">ANÓTHER DIMENSION VOTING BOOTH</h1>
          <section class="text-tools" aria-label="Naam bewerken">
            <button id="toggleTextEdit" type="button">Naam wijzigen</button>
            <button id="saveTextEdit" type="button" hidden>Naam opslaan</button>
            <button id="resetTextEdit" type="button" hidden>Naam resetten</button>
          </section>
        </div>
      </div>
      <section class="vote-filters" aria-label="Votes filter">
        <div class="vote-buttons">
          <button class="vote-filter vote-filter-client" id="clientVoteFilter" type="button" data-filter="vote-client" aria-label="Groene stemmen tonen"></button>
          <button class="vote-filter vote-filter-admin" id="adminVoteFilter" type="button" data-filter="vote-admin" aria-label="Pink stemmen tonen"></button>
          <button class="vote-filter vote-filter-voter3" id="voter3VoteFilter" type="button" data-filter="vote-voter3" aria-label="Lichtblauwe stemmen tonen"></button>
        </div>
        <div class="vote-label">VOTES</div>
      </section>
      <div class="top-actions">
        <div class="count"><span id="count">43</span> assets</div>
        <button class="status-filter" id="addedFilter" type="button" data-filter="TOEGEVOEGD">Toegevoegd</button>
        <button class="status-filter" id="deletedFilter" type="button" data-filter="deleted">Verwijderd</button>
        <button id="projectOverviewButton" type="button">Projecten</button>
        <button id="logoutButton" type="button">Uitloggen</button>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="Filter">
        <button class="filter active" data-filter="all">TAGS</button>
      </section>

      <input id="addFileInput" type="file" accept="image/*,video/mp4,video/quicktime,audio/mpeg,audio/aac,audio/mp4,.mov,.mp4,.mp3,.aac,.m4a" multiple hidden />
      <section id="gallery" class="gallery" aria-label="Images galerij"></section>
    </main>

    <dialog id="lightboxDialog" class="lightbox-dialog">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Sluiten">×</button>
      <div id="lightboxMediaStage" class="lightbox-media-stage"></div>
      <button id="lightboxStop" class="media-stop lightbox-stop" type="button" hidden>Stop</button>
      <img id="lightboxImage" alt="" />
    </dialog>

    <dialog id="cropDialog" class="crop-dialog">
      <form method="dialog">
        <button class="close" aria-label="Sluiten">×</button>
      </form>
      <div class="crop-head">
        <div>
          <p class="eyebrow" id="cropGroup">BETON</p>
          <h2 id="cropTitle">#01</h2>
        </div>
        <div class="crop-actions">
          <button id="aspectFree" type="button" class="active">Vrij</button>
          <button id="aspectGrid" type="button">Grid</button>
          <button id="aspectSquare" type="button">1:1</button>
        </div>
      </div>
      <div class="crop-stage-wrap">
        <canvas id="cropCanvas" width="1000" height="680"></canvas>
      </div>
      <div class="crop-footer">
        <button id="undoCrop" type="button">↩️ Undo crop</button>
        <button id="resetCrop" type="button">Reset crop</button>
        <button id="downloadCrop" type="button">Download crop</button>
        <button id="saveCrop" type="button">Opslaan in grid</button>
      </div>
      <p id="cropMeta" class="crop-meta"></p>
    </dialog>
    </div>

    <img class="brand-mark" src="/assets/another-dimension-logo.png" alt="ANÓTHER DIMENSION" />

    <script src="/script.js"></script>
  </body>
</html>
